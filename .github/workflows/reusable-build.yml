name: Reuable Build

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Application Name'
        required: true
        type: string

      environment:
        description: 'Deployment Environment'
        required: true
        default: staging
        type: string

    secrets:
      docker_token:
        required: true
    
    outputs:
      build-version:
        description: "Generated build version"
        value: ${{ jobs.build.outputs.Version }}

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      Version: ${{ steps.build_version.outputs.Version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print Build Info
        run: |
          echo "Building  ${{ inputs.app_name }} for ${{ inputs.environment }} environment"

      - name: Generate Build Version
        id: build_version
        run: |
          echo "Version=v1.0.${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Verify docker token
        run: |
          if [ -n "${{ secrets.docker_token }}" ]; then
            echo "Docker token is set: true"
          else
            echo "Docker token is set: false"
          fi