name: Job Outputs Demo

on: 
  workflow_dispatch:

jobs:
  get-date:
    runs-on: ubuntu-latest

    outputs:
      today: ${{ steps.date_step.outputs.today }}
    
    steps:
      - name: Get today's date
        id: date_step
        run: echo "today=$(date)" >> $GITHUB_OUTPUT

  print-date:
    runs-on: ubuntu-latest
    needs: get-date

    steps:
      - name: Print the date from previous job
        run: echo "Today's date is = ${{ needs.get-date.outputs.today }}"