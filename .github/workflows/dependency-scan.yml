name: Dependency Scan

on:
  workflow_call:

jobs:

  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pip Audit
        run: pip install pip-audit
        with:
          python-version: "3.12"

      - name: Audit Dpendencies
        run: pip-audit -r requirements.txt