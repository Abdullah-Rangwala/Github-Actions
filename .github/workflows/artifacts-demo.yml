name: Artifact Transfer Demo

on: push

jobs:
  generate-file:
    runs-on: ubuntu-latest

    steps:
      - name: Create report
        run: |
          echo "Pipeline Report" > report.txt
          echo "Status: SUCCESS" >> report.txt
          echo "Generated at: $(date)" >> report.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report
          path: report.txt


  use-file:
    runs-on: ubuntu-latest
    needs: generate-file

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-report

      - name: Show report content
        run: |
          echo "Reading artifact from previous job:"
          cat report.txt